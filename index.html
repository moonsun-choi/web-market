<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>더하기 빼기 마켓</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">가격 계산</p>
        <h1>🛒 더하기 빼기 마켓</h1>
      </div>

      <div class="top-buttons" aria-label="화면 설정">
        <button id="studentModeButton" class="pill-button active" type="button" aria-pressed="true">학생</button>
        <button id="adminModeButton" class="pill-button" type="button" aria-pressed="false">교사용</button>
        <button id="soundButton" class="pill-button" type="button" aria-pressed="true">🔊</button>
      </div>
    </header>

    <main>
      <section id="studentPanel" aria-labelledby="studentTitle">
        <h2 id="studentTitle" class="visually-hidden">학생용 가격 더하기 빼기 연습</h2>

        <section class="status-strip" aria-label="현재 상태">
          <div class="status-card">
            <span class="status-icon">💰</span>
            <span class="status-label">현재</span>
            <strong id="currentTotalText">0원</strong>
          </div>
          <div class="status-card">
            <span class="status-icon">🧺</span>
            <span class="status-label">개수</span>
            <strong id="itemCountText">0개</strong>
          </div>
          <div class="status-card action-hint add-hint">
            <span class="status-icon">➕</span>
            <strong>담기</strong>
          </div>
          <div class="status-card action-hint minus-hint">
            <span class="status-icon">➖</span>
            <strong>빼기</strong>
          </div>
        </section>

        <div class="student-grid">
          <section class="panel market-panel" aria-labelledby="marketTitle">
            <div class="section-head compact-head">
              <h2 id="marketTitle">물건</h2>
              <button id="resetCartButton" class="small-button" type="button">비우기</button>
            </div>
            <div id="productGrid" class="product-grid" aria-live="polite"></div>
          </section>

          <section class="panel solve-panel" aria-labelledby="solveTitle">
            <div class="section-head">
              <h2 id="solveTitle">문제</h2>
              <button id="cancelProblemButton" class="small-button" type="button">취소</button>
            </div>

            <div id="problemCard" class="problem-card" aria-live="polite"></div>

            <div class="answer-box" aria-label="내 답">
              <span>내 답</span>
              <strong id="answerText">?</strong>
              <span>원</span>
            </div>

            <div class="keypad" aria-label="숫자 입력판">
              <button type="button" data-key="1">1</button>
              <button type="button" data-key="2">2</button>
              <button type="button" data-key="3">3</button>
              <button type="button" data-key="4">4</button>
              <button type="button" data-key="5">5</button>
              <button type="button" data-key="6">6</button>
              <button type="button" data-key="7">7</button>
              <button type="button" data-key="8">8</button>
              <button type="button" data-key="9">9</button>
              <button type="button" data-key="back">⌫</button>
              <button type="button" data-key="0">0</button>
              <button type="button" data-key="clear">지우기</button>
            </div>

            <button id="checkButton" class="check-button" type="button">확인</button>
          </section>

          <section class="panel cart-panel" aria-labelledby="cartTitle">
            <div class="section-head compact-head">
              <h2 id="cartTitle">장바구니</h2>
            </div>
            <div id="cartList" class="cart-list" aria-live="polite"></div>
          </section>
        </div>
      </section>

      <section id="adminPanel" hidden aria-labelledby="adminTitle">
        <section class="panel admin-top">
          <div>
            <p class="eyebrow">교사용</p>
            <h2 id="adminTitle">물건 바꾸기</h2>
          </div>
          <div class="admin-buttons">
            <button id="resetProductsButton" class="small-button" type="button">기본값</button>
            <button id="clearAllButton" class="danger-button" type="button">모두 지우기</button>
          </div>
        </section>

        <form id="addProductForm" class="panel admin-form">
          <h2>새 물건</h2>
          <div class="form-grid">
            <label>
              <span>이름</span>
              <input id="addNameInput" type="text" maxlength="30" placeholder="사과" required />
            </label>
            <label>
              <span>가격</span>
              <input id="addPriceInput" type="number" min="0" step="10" placeholder="500" required />
            </label>
            <label>
              <span>사진 주소</span>
              <input id="addImageUrlInput" type="url" placeholder="https://..." />
            </label>
            <label>
              <span>사진 파일</span>
              <input id="addImageFileInput" type="file" accept="image/*" />
            </label>
          </div>
          <button class="check-button add-product-button" type="submit">추가</button>
        </form>

        <section class="panel" aria-labelledby="adminListTitle">
          <h2 id="adminListTitle">목록</h2>
          <div id="adminList" class="admin-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="feedbackToast" role="status" aria-live="polite"></div>
  <div id="confettiLayer" aria-hidden="true"></div>
</body>
</html>
