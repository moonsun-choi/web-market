<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마켓 계산 놀이</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>🛒 마켓 계산</h1>
        <p>보고 · 담고 · 쓰고 · 확인!</p>
      </div>
      <nav class="top-actions" aria-label="화면 설정">
        <button id="studentModeButton" class="pill active" type="button" aria-pressed="true">학생</button>
        <button id="adminModeButton" class="pill" type="button" aria-pressed="false">교사</button>
        <button id="soundButton" class="pill" type="button" aria-pressed="true">🔊</button>
      </nav>
    </header>

    <main>
      <section id="studentPanel" aria-label="학생 화면">
        <section class="icon-steps" aria-label="학습 순서">
          <span>🛍️<b>담기</b></span>
          <span>🏷️<b>할인</b></span>
          <span>✍️<b>쓰기</b></span>
          <span>✅<b>확인</b></span>
        </section>

        <section class="score-strip" aria-label="현재 상태">
          <article><small>종류</small><strong id="summaryKindCount">0</strong></article>
          <article><small>개수</small><strong id="summaryItemCount">0</strong></article>
          <article><small>맞힘</small><strong id="summaryCorrectCount">0/0</strong></article>
          <article class="total-score"><small>총액</small><strong id="summaryFinalTotal">?</strong></article>
        </section>

        <div class="student-grid">
          <section class="panel shop-panel" aria-labelledby="shopTitle">
            <div class="panel-head">
              <h2 id="shopTitle">🛍️ 고르기</h2>
            </div>
            <div id="productGrid" class="product-grid" aria-live="polite"></div>
          </section>

          <section class="panel basket-panel" aria-labelledby="basketTitle">
            <div class="panel-head">
              <h2 id="basketTitle">🧺 장바구니</h2>
              <button id="resetCartButton" class="ghost-button" type="button">비우기</button>
            </div>
            <div id="cartList" class="cart-list" aria-live="polite"></div>
          </section>

          <section class="panel quiz-panel" aria-labelledby="quizTitle">
            <div class="panel-head">
              <h2 id="quizTitle">✍️ 문제</h2>
              <button id="resetPracticeButton" class="ghost-button" type="button">지우기</button>
            </div>
            <div id="quizBox" class="quiz-box" aria-live="polite"></div>
            <button id="celebrateButton" class="big-done-button" type="button">🎉 칭찬</button>
          </section>
        </div>
      </section>

      <section id="adminPanel" hidden aria-label="교사용 관리 화면">
        <section class="panel admin-hero">
          <div>
            <h2>⚙️ 교사 설정</h2>
            <p>이름 · 정가 · 할인 · 사진</p>
          </div>
          <div class="admin-buttons">
            <button id="resetProductsButton" class="ghost-button" type="button">기본값</button>
            <button id="clearAllButton" class="danger-button" type="button">전체 삭제</button>
          </div>
        </section>

        <form id="addProductForm" class="panel admin-form">
          <h2>➕ 추가</h2>
          <div class="admin-fields">
            <label><span>이름</span><input id="addNameInput" type="text" maxlength="30" placeholder="사과" required /></label>
            <label><span>정가</span><input id="addPriceInput" type="number" min="0" step="10" placeholder="1000" required /></label>
            <label><span>할인 %</span><input id="addDiscountInput" type="number" min="0" max="100" step="1" value="0" required /></label>
            <label><span>사진 주소</span><input id="addImageUrlInput" type="url" placeholder="https://..." /></label>
            <label><span>사진 파일</span><input id="addImageFileInput" type="file" accept="image/*" /></label>
          </div>
          <button class="primary-button" type="submit">저장</button>
        </form>

        <section class="panel">
          <div class="panel-head">
            <h2>🧾 물건</h2>
          </div>
          <div id="adminList" class="admin-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="feedbackToast" role="status" aria-live="polite"></div>
  <div id="confettiLayer" aria-hidden="true"></div>
</body>
</html>
